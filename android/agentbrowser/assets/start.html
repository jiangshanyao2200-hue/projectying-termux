<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>T-web</title>
  <style>
    :root {
      --bg: #08111f;
      --panel: rgba(12, 21, 37, 0.88);
      --panel-strong: rgba(17, 29, 51, 0.96);
      --line: rgba(125, 211, 252, 0.20);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --accent-2: #60a5fa;
      --success: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans CJK SC", "Source Han Sans SC", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(56,189,248,0.18), transparent 38%),
        radial-gradient(circle at bottom left, rgba(96,165,250,0.18), transparent 34%),
        linear-gradient(180deg, #07101c 0%, #08111f 100%);
      padding: 22px 18px 32px;
    }

    .hero {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(15,23,42,0.78));
      box-shadow: 0 18px 50px rgba(2, 8, 23, 0.42);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    h1 {
      margin: 10px 0 8px;
      font-size: 30px;
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    form {
      margin-top: 18px;
      display: flex;
      gap: 10px;
      align-items: stretch;
      min-width: 0;
    }

    input {
      flex: 1;
      min-width: 0;
      border: 1px solid rgba(125, 211, 252, 0.18);
      border-radius: 18px;
      padding: 15px 16px;
      color: var(--text);
      background: rgba(15, 23, 42, 0.88);
      outline: none;
      font-size: 15px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 0 16px;
      flex: 0 0 auto;
      max-width: 34vw;
      min-height: 50px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #03111f;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    @media (max-width: 420px) {
      body { padding: 16px 12px 24px; }
      .hero { padding: 18px; border-radius: 22px; }
      h1 { font-size: 24px; }
      form { gap: 8px; }
      input { padding: 13px 12px; font-size: 14px; }
      button { min-width: 64px; padding: 0 12px; font-size: 14px; }
      .grid { grid-template-columns: 1fr; }
    }

    .section {
      margin-top: 18px;
      padding: 18px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(14px);
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 15px;
      letter-spacing: 0.04em;
      color: #dbeafe;
    }

    .grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      padding: 16px;
      min-height: 112px;
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.14);
      background: linear-gradient(180deg, rgba(15,23,42,0.95), rgba(15,23,42,0.72));
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .card strong {
      display: block;
      font-size: 16px;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .card span {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .note {
      margin-top: 18px;
      border-left: 3px solid var(--success);
      padding: 12px 0 0 12px;
      color: #cbd5e1;
      font-size: 13px;
      line-height: 1.7;
    }
  </style>
</head>
<body>
  <section class="hero compact-hero">
    <p>为真实网页、登录态和后续 AI 接管准备的轻量 Web 容器。可直接搜索或访问常用入口。</p>
    <form action="https://www.baidu.com/s" method="get">
      <input type="text" name="wd" placeholder="搜索服务器报错、云控制台、Linux 文档、状态页">
      <button type="submit">搜索</button>
    </form>
  </section>

  <section class="section">
    <h2 class="section-title">高频入口</h2>
    <div class="grid">
      <a class="card" href="https://www.aliyun.com/">
        <strong>阿里云</strong>
        <span>服务器、控制台、账单、域名和安全配置。</span>
      </a>
      <a class="card" href="https://cloud.tencent.com/">
        <strong>腾讯云</strong>
        <span>查看文档、控制台、状态页和最新踩坑信息。</span>
      </a>
      <a class="card" href="https://console.cloud.google.com/">
        <strong>云控制台</strong>
        <span>登录云厂商、服务器面板或 Web 管理后台。</span>
      </a>
      <a class="card" href="https://github.com/">
        <strong>GitHub</strong>
        <span>用于配合 AI 查看面板、验证码和后台状态。</span>
      </a>
      <a class="card" href="https://www.cloudflarestatus.com/">
        <strong>状态页</strong>
        <span>查看服务可用性、公告、故障和维护窗口。</span>
      </a>
      <a class="card" href="https://developer.mozilla.org/zh-CN/">
        <strong>技术文档</strong>
        <span>查看 Web、网络和平台接口说明。</span>
      </a>
    </div>
    <div class="note">
      登录后的 Cookie、LocalStorage 和 WebView 会话会保留在 App 自己的容器里，
      这比借用外部浏览器更适合后续让 AI 接力。
    </div>
  </section>
</body>
</html>
